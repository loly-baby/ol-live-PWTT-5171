<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        margin: 0;
        background: #0b0f19;
        color: #fff;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .box {
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 24px;
        text-align: center;
        background: rgba(255, 255, 255, 0.02);
        max-width: 520px;
      }
      .ok {
        margin-top: 24px;
        background: rgba(34, 197, 94, 0.1);
        color: #4ade80;
        padding: 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: bold;
      }
      /* 新增的成功按钮样式 */
      .success-button {
        margin-top: 24px;
        background: #22c55e; /* 绿色背景 */
        color: #fff; /* 白色文字 */
        padding: 12px 24px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: bold;
        border: none; /* 移除默认边框 */
        cursor: pointer; /* 鼠标悬停时显示手型 */
        transition: background 0.3s ease; /* 平滑过渡效果 */
      }
      .success-button:hover {
        background: #16a34a; /* 悬停时变暗 */
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1 style="font-size: 24px; margin-bottom: 10px;">应用架构扫描完毕</h1>
      <p style="color: #60a5fa; font-size: 12px; letter-spacing: 2px; margin-bottom: 30px;">
        Application Architecture Ready
      </p>
      <div class="ok">校验通过：准备进入物理云端交付</div>
      <!-- 增加的成功按钮 -->
      <button class="success-button">完成部署</button>
    </div>
  </body>
</html>
